[build]
  command = "npx tinacms build && npx astro build"
  publish = "dist"

[build.environment]
  NODE_VERSION = "20"
  # tinacms build is memory-hungry; raise Node's heap limit or it OOMs (exit 134)
  NODE_OPTIONS = "--max-old-space-size=4096"
  # The Tina client ID is public by design (baked into the editor); token is read-only.
  # Tell Netlify's secrets scanner not to flag them, or the build fails.
  SECRETS_SCAN_OMIT_KEYS = "NEXT_PUBLIC_TINA_CLIENT_ID,TINA_TOKEN"

# Prompts for these two values during the Netlify "deploy" import flow
[template.environment]
  NEXT_PUBLIC_TINA_CLIENT_ID = "Your Tina Cloud Client ID"
  TINA_TOKEN = "Your Tina Cloud read-only token"
