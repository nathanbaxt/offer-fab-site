[build]
  # Editor (public/admin) + Tina generated files are pre-built and committed,
  # so Netlify only runs the light Astro build. Content edits still auto-publish
  # (Tina commits home.json → this build runs). Only a schema change (tina/config.ts)
  # needs a local `npx tinacms build` + recommit of public/admin + tina/__generated__.
  command = "npx astro build"
  publish = "dist"

[build.environment]
  NODE_VERSION = "22.12.0"
  SECRETS_SCAN_OMIT_KEYS = "NEXT_PUBLIC_TINA_CLIENT_ID,TINA_TOKEN"
